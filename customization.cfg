# ==============================================================================
# Linux-TkG 定制化配置文件 (通用 x86-64-v3 版)
# 目标: Debian Sid / 通用 x86-64-v3 硬件
# 特性: ACS直通支持, OpenRGB支持, BORE/EEVDF自动适配
# ==============================================================================

# ------------------------------------------------------------------------------
# 基础设置
# ------------------------------------------------------------------------------

_distro="Debian"              # 设置为 Debian 以生成 .deb 安装包
_version=""                   # 内核版本，由 check_version.sh 脚本自动更新

# ------------------------------------------------------------------------------
# 杂项与构建优化
# ------------------------------------------------------------------------------

_EXT_CONFIG_PATH=""           # 外部配置文件路径，留空使用本文件
_NUKR="true"                  # Arch 特定清理选项，非 Arch 系统忽略
_git_mirror="https://github.com/torvalds/linux.git" # 使用 GitHub 镜像避免 Anubis 拦截
_kernel_work_folder="/tmp"        # 内核源码工作目录，留空使用默认值
_kernel_source_folder="/tmp"      # 内核源码永久存储目录，留空使用默认值
CUSTOM_GCC_PATH=""            # 自定义 GCC 编译器路径，留空使用系统默认
CUSTOM_LLVM_PATH=""           # 自定义 LLVM 编译器路径，留空使用系统默认
_force_all_threads="true"     # 强制使用所有 CPU 核心以加速编译
_noccache="true"              # 禁用 ccache 以节省 CI 环境磁盘空间
_kernel_on_diet="false"       # 禁用内核裁剪以保证驱动通用性
_modprobeddb="false"          # 禁用 modprobed-db 因为 CI 环境无数据库
_modprobeddb_db_path=~/.config/modprobed.db # modprobed-db 数据库路径，此处无效
_menunconfig="0"               # 禁止编译前弹出菜单配置以确保自动化
_diffconfig=""                # 禁用生成配置差异片段
_diffconfig_name=""           # 配置差异片段文件名，此处无效

# ------------------------------------------------------------------------------
# 内核核心选项
# ------------------------------------------------------------------------------

_configfile=""                # 使用 TKG 预设的基础配置文件
_config_updating="olddefconfig" # 自动接受新内核选项的默认值
_debugdisable="true"          # 禁用内核调试功能以提升性能
_STRIP="true"                 # 剥离调试符号以减小 deb 包体积
_cpusched="bore"              # 首选 BORE 调度器，脚本可能将其改为 eevdf
_compiler="llvm"              # 使用 Clang/LLVM 编译器以获得更好 LTO 支持
_libunwind_replace=""         # 替换 libunwind，实验性功能保持默认
_llvm_ias="1"                 # 启用 LLVM 集成汇编器以加速编译
_lto_mode="thin"              # 启用 Thin LTO 以平衡性能与编译时间
_preempt_rt=""                # 不启用实时补丁以保持桌面低延迟
_preempt_rt_force=""          # 不强制启用实时补丁
_sched_yield_type=""          # 调度器 yield 类型，BORE 下保持默认
_rr_interval=""               # 轮询间隔，BORE 下保持默认
_ftracedisable="false"        # 启用 Ftrace 以兼容 SCX 等高级调度器
_numadisable="false"          # 不禁用 NUMA 以保持多路服务器兼容性
_misc_adds="true"             # 启用杂项附加补丁以修复常见问题
_tickless="2"                  # Tickless Idle
_acs_override="true"          # 启用 ACS 覆盖以支持 VFIO 设备直通
_glitched_base="true"         # 启用 Zen/Liquorix 等社区性能补丁集
_zenify="true"                # 启用 Zenify 桌面与游戏优化补丁
_compileroptlevel="1"         # 使用 O2 优化等级以保证稳定性
_processor_opt="x86-64-v3"    # 针对 CPU 优化指令集
_smt_nice=""                  # SMT 优先级，保持默认让调度器决定
_bore_min_base_slice_ns="2000000" # BORE 调度器最小时间片，默认值即可
_random_trust_cpu="true"      # 信任 CPU 硬件随机数生成器以加快启动
_timer_freq="5"                # 定时器频率，为 1000Hz
_default_cpu_gov=""           # 默认 CPU 频率调节器，保持内核默认
_aggressive_ondemand="true"   # 启用激进的 ondemand 调节以减少卡顿
_tcp_cong_alg="bbr"           # 默认使用 BBR 拥塞控制算法
_custom_commandline="intel_pstate=passive split_lock_detect=off" # 添加自定义内核启动参数
_clear_patches="true"         # 启用 Clear Linux 性能补丁集
_openrgb="true"               # 启用 OpenRGB 内核驱动以支持硬件灯控

# ------------------------------------------------------------------------------
# 特殊选项
# ------------------------------------------------------------------------------

_offline=""                   # 禁用离线模式以允许在线获取源码
_custom_pkgbase=""            # 自定义包名前缀，Arch 特定且此处忽略
_kernel_localversion="-debian-tkg" # 添加内核版本后缀以便识别
_NR_CPUS_value=""             # 最大 CPU 数量，留空使用内核默认大值
_install_after_building="no"  # 构建后不自动安装，仅生成 deb 包
_logging_use_script="no"     # 使用 script 命令记录完整编译日志

KCFLAGS=""                    # 额外 C 语言编译器标志，保持默认
KCPPFLAGS=""                  # 额外 C++ 编译器标志，保持默认
KRUSTFLAGS=""                 # 额外 Rust 编译器标志，保持默认

# ------------------------------------------------------------------------------
# 遗留选项
# ------------------------------------------------------------------------------

_fsync_backport="true"        # 启用 Fsync 背 port 以改善游戏性能
_fsync_legacy="true"          # 启用 Fsync  legacy 支持
_fsync_futex2="false"         # 禁用已废弃的 Futex2 支持
_zfsfix="true"                # 启用 ZFS 兼容性修复
_runqueue_sharing=""          # MuQSS 运行队列共享，此处无效
_irq_threading="false"        # MuQSS IRQ 线程，此处无效
_mglru="true"                 # 启用多代 LRU 内存回收机制
_ntsync="false"               # 禁用实验性 Ntsync 支持

# ------------------------------------------------------------------------------
# 用户补丁与配置片段
# ------------------------------------------------------------------------------

_community_patches=""         # 不应用额外的社区补丁
_user_patches="false"         # 禁用用户自定义补丁以避免错误
_user_patches_no_confirm="false" # 用户补丁确认选项，此处无效
_config_fragments="false"     # 禁用用户自定义配置片段
_config_fragments_no_confirm="false" # 配置片段确认选项，此处无效
