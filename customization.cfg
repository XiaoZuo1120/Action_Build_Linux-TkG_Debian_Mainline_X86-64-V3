# ==============================================================================
# linux-TkG 定制化配置文件
# 目标: Debian Sid (ThinkPad T14 Gen 1, i7-10510U, Comet Lake)
# 场景: GitHub Actions 自动化构建 (注重磁盘空间管理与高性能)
# ==============================================================================

# ------------------------------------------------------------------------------
# 基础设置
# ------------------------------------------------------------------------------

# Linux 发行版
# 设置为 "Debian" 以生成 .deb 包
_distro="Debian"

# 内核版本
# 【重要】此值将由 check_version.sh 脚本自动更新为具体版本号 (如 "6.13-rc5")
# 请勿手动修改，留空即可。
_version=""

# ------------------------------------------------------------------------------
# 杂项与构建优化 (针对 GitHub Actions 空间优化)
# ------------------------------------------------------------------------------

# 外部配置文件路径
# 留空，直接使用本文件
_EXT_CONFIG_PATH=""

# [Arch 特定] 清理选项
# 非 Arch 系统忽略
_NUKR="true"

# Git 镜像源
# 尝试使用 GitHub 上的 Linux 镜像，通常比 kernel.org 快且稳定
_git_mirror="https://github.com/torvalds/linux.git"

# 内核源码工作目录
# 留空使用默认目录。
_kernel_work_folder=""

# 内核源码永久存储目录
# 留空使用默认目录
_kernel_source_folder=""

# 自定义 GCC 编译器路径
# 留空使用系统默认
CUSTOM_GCC_PATH=""

# 自定义 LLVM 编译器路径
# 留空使用系统默认。确保 runner 上安装了 clang 和 lld
CUSTOM_LLVM_PATH=""

# 强制使用所有线程编译
# 在 GitHub Actions 中，充分利用所有可用核心以缩短编译时间
_force_all_threads="true"

# 禁用 ccache
# 【关键决策】: 设为 "true" 禁用 ccache。
# 理由: 虽然 ccache 能加速二次编译，但在 CI 环境中，第一次全量编译生成的 ccache 缓存极大 (可能 >5GB)，
# 加上内核源码和中间文件，极易导致 GitHub Runner 磁盘空间不足 (Disk Full)。
# 我们选择牺牲一点二次编译速度，换取构建的稳定性。
_noccache="true"

# 精简内核模块 (_kernel_on_diet)
# 设为 "false" 以编译所有模块。
# 理由: 在 CI 环境中没有 modprobed-db 数据库，盲目裁剪可能导致缺少 WiFi/蓝牙/NVIDIA 驱动而无法启动。
# 为了通用性和稳定性，编译全模块。
_kernel_on_diet="false"

# 使用 modprobed-db
# 在 CI 环境中无法使用，必须设为 "false"
_modprobeddb="false"

# modprobed-db 数据库路径
# 无关紧要
_modprobeddb_db_path=~/.config/modprobed.db

# 编译前调用菜单配置
# 自动化构建必须设为空或 false，禁止弹窗
_menunconfig=""

# 生成配置片段
# 自动化构建不需要，设为 false
_diffconfig=""

# 配置片段文件名
# 无关紧要
_diffconfig_name=""

# ------------------------------------------------------------------------------
# 内核核心选项 (性能与功能)
# ------------------------------------------------------------------------------

# 默认配置文件
# 留空使用 tkg 预设的配置，这些配置已经过优化
_configfile=""

# 配置更新方式
# "olddefconfig" 自动接受新选项的默认值，适合自动化构建
_config_updating="olddefconfig"

# 禁用内核调试功能
# 设为 "true" 减小内核体积并提升性能。日常使用不需要内核级调试器。
_debugdisable="true"

# 剥离调试符号
# 必须设为 "true"。否则生成的 .deb 包会非常大 (几GB)，导致上传失败或占用过多 Artifact 空间。
_STRIP="true"

# CPU 调度器
# 推荐: "bore" (Burst-Oriented Response Enhancer)
# 理由: BORE 是基于 EEVDF/CFS 的改进版，专门优化突发负载响应。
# 对于桌面交互、窗口切换、游戏加载等场景，比默认 EEVDF 更流畅。
_cpusched="bore"

# 编译器
# 推荐: "llvm" (Clang)
# 理由: Clang 编译速度通常比 GCC 快，且对 LTO 支持更好。
_compiler="llvm"

# 替换 libunwind
# 实验性功能，保持默认留空
_libunwind_replace=""

# 使用 LLVM 集成汇编器
# 当使用 LLVM 编译器时，设为 "1" 可以使用 llvm-as，速度更快
_llvm_ias="1"

# Clang LTO (链接时优化) 模式
# 推荐: "thin"
# 理由: Thin LTO 在性能和编译时间之间取得了最佳平衡。
# "full" LTO 太慢且容易在 CI 环境中因内存不足而失败。
_lto_mode="thin"

# 应用 PREEMPT_RT 实时补丁
# 日常使用不需要硬实时，保持禁用
_preempt_rt=""

# 强制应用 PREEMPT_RT
# 保持禁用
_preempt_rt_force=""

# CPU sched_yield 类型
# 仅对 PDS/MuQSS/BMQ 有效。既然我们选了 BORE，此项留空使用默认值即可
_sched_yield_type=""

# Round Robin 间隔
# 仅对旧版调度器有效。留空使用默认值
_rr_interval=""

# 禁用 FTRACE
# 【最终修正】: 设为 "false" (即启用 Ftrace)。
# 理由: 
# 1. 现代内核中 Ftrace 运行时开销极小 (<1%)。
# 2. 根据 sched-ext/scx 文档，CONFIG_FUNCTION_TRACER 是某些高级调度器 (如 LAVD) 正常工作所必需的。
# 3. 保持启用可确保更好的兼容性和未来的可扩展性 (如尝试 SCX)。
_ftracedisable="false"

# 禁用 NUMA
# 你的 CPU 是移动端 i7，单路 socket，NUMA 影响极小。
# 但为了兼容性（特别是如果有外接 GPU 或其他设备），保持默认 "false" 更安全
_numadisable="false"

# 启用杂项附加补丁
# 包含一些临时修复和非 Arch 特定的调整。建议启用
_misc_adds="true"

# 无滴答模式 (Tickless)
# 留空使用默认值。默认值通常是根据调度器优化的
_tickless=""

# ACS 覆盖补丁
# 用于 PCI 直通。ThinkPad T14 一般不做 VFIO 直通，设为 "false" 更安全
_acs_override="false"

# 启用 Zen/Liquorix/XanMod 等社区补丁集
# 必须设为 "true"。这是 tkg 内核性能优于原生内核的关键
_glitched_base="true"

# 启用 Zenify 游戏/桌面优化
# 必须设为 "true"。包含内存管理、I/O 调度等优化
_zenify="true"

# 编译器优化等级
# 默认 "1" (-O2) 是最稳定的。"-O3" 可能会增大二进制体积并导致极少数不稳定
_compileroptlevel="1"

# CPU 编译器优化 (-march)
# 关键设置！
# 你的 CPU 是 i7-10510U (Comet Lake)。
# "x86-64-v3" 是一个包含 AVX2, BMI, BMI2, FMA 等指令集的通用标准。
# 它比 "skylake" 更通用，比 "native" 更适合分发。
_processor_opt="x86-64-v3"

# SMT (超线程) Nice 优先级
# 保持默认，让调度器处理
_smt_nice=""

# BORE 调度器最小基础时间片
# 默认值 2000000 (ns) 通常很好。除非你遇到明显的卡顿，否则不要改
_bore_min_base_slice_ns="2000000"

# 信任 CPU 制造商初始化随机数生成器
# 设为 "true" 可以加快启动速度，现代 CPU 的 RNG 是可信的
_random_trust_cpu="true"

# 定时器频率
# 留空使用默认值。对于 BORE/EEVDF，默认通常是 1000Hz，适合桌面
_timer_freq=""

# 默认 CPU 频率调节器
# 留空使用内核默认 (通常是 schedutil)
_default_cpu_gov=""

# 使用激进的 ondemand 调节器
# 设为 "true"。这会让 CPU 频率提升更积极，减少低负载下的卡顿
_aggressive_ondemand="true"

# 默认 TCP 拥塞控制算法
# 留空使用默认 (Cubic)。目前采用 BBR
_tcp_cong_alg="bbr"

# 自定义内核命令行参数
# "intel_pstate=passive": 允许使用传统的 ondemand/schedutil 调节器
# "split_lock_detect=off": 禁用分裂锁检测，可以提升某些多线程应用的性能
_custom_commandline="intel_pstate=passive split_lock_detect=off"

# 启用 Clear Linux 补丁
# 必须设为 "true"。Clear Linux 的补丁对性能有显著提升
_clear_patches="true"

# 启用 OpenRGB 支持
# ThinkPad 通常不支持 OpenRGB，建议设为 "false" 以减小体积
_openrgb="false"

# ------------------------------------------------------------------------------
# 特殊选项
# ------------------------------------------------------------------------------

# 离线模式
# 在 GitHub Actions 中，我们需要从网络获取源码，所以设为空或 false
_offline=""

# 自定义包名 (Arch 特定)
# 非 Arch 忽略
_custom_pkgbase=""

# 内核本地版本后缀
# 这会影响 `uname -r` 的输出。
# 留空会自动生成类似 "-tkg-bore-llvm" 的后缀。
# 你可以自定义，例如 "-debian-tkg"，以便识别
_kernel_localversion="-debian-tkg"

# 最大 CPU 数量
# 留空使用默认值 (通常足够大)
_NR_CPUS_value=""

# 构建后自动安装 (非 Arch)
# 在 GitHub Actions 中，我们只希望生成 .deb 包，不希望脚本尝试安装它
# 设为 "no"，然后手动使用 dpkg -i 安装生成的包
_install_after_building="no"

# 使用 script 命令记录日志
# 设为 "yes" 可以保存完整的编译日志，方便调试
_logging_use_script="yes"

# 额外 C 语言编译器标志
# 除非你是内核开发者，否则留空。不要添加 -mavx 等 SIMD 指令，会导致内核崩溃
KCFLAGS=""

# 额外 C++ 编译器标志
# 留空
KCPPFLAGS=""

# 额外 Rust 编译器标志
# 留空
KRUSTFLAGS=""

# ------------------------------------------------------------------------------
# 遗留选项 (Legacy)
# ------------------------------------------------------------------------------

# Fsync 背 port
# 对于较新内核，Fsync 已经上游化，此选项无效，保持默认
_fsync_backport="true"

# Fsync  legacy
# 对于较新内核，无效，保持默认
_fsync_legacy="true"

# Futex2
# 已废弃，保持默认
_fsync_futex2="false"

# ZFS 修复
# 如果你不使用 ZFS，可以设为 "false"。但设为 "true" 也无害
_zfsfix="true"

# MuQSS 运行队列共享
# 我们没用 MuQSS，忽略
_runqueue_sharing=""

# MuQSS IRQ 线程
# 忽略
_irq_threading="false"

# MGLRU (多代 LRU)
# 已在主线内核中，设为 "true" 确保启用（如果补丁存在）
_mglru="true"

# Ntsync
# 实验性功能，需要用户空间配合。对于日常使用，建议 "false"
_ntsync="false"

# ------------------------------------------------------------------------------
# 用户补丁与配置片段
# ------------------------------------------------------------------------------

# 社区补丁
# 留空，不应用额外社区补丁
_community_patches=""

# 启用用户补丁
# 除非你有自己的 .mypatch 文件，否则设为 "false" 以避免错误
_user_patches="false"

# 自动应用用户补丁
# 忽略
_user_patches_no_confirm="false"

# 启用配置片段
# 除非你有自己的 .myfrag 文件，否则设为 "false"
_config_fragments="false"

# 自动应用配置片段
# 忽略
_config_fragments_no_confirm="false"