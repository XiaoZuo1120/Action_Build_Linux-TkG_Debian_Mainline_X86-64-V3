---
name: 🐧 Build Linux-TkG Kernel (Debian/Sid)
on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 🔨 强制重新编译 (即使版本未变)
        required: false
        default: "false"
        type: boolean
#  schedule:
#    - cron: 0 10 8,22 * *
env:
  TKG_DIR: linux-tkg
  DEBIAN_FRONTEND: noninteractive
jobs:
  prepare-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🔍 Check Latest Kernel Version
        id: check_version
        run: |
          echo "::group::🔍 Version Check"
          chmod +x check_version.sh
          export FORCE_BUILD="${{ github.event.inputs.force_build }}"
          ./check_version.sh
          echo "::endgroup::"
      - name: ⏭️ Skip Build if Up-to-date
        if: env.SKIP_BUILD == 'true'
        run: |
          echo "✅ 内核版本已是最新 (${{ env.NEW_VERSION }})，无需操作。"
          exit 0
      - name: 🧹 Free Disk Space (Slimhub)
        if: env.SKIP_BUILD != 'true'
        uses: rokibhasansagar/slimhub_actions@main
      - name: 📅 Generate Build Timestamp
        if: env.SKIP_BUILD != 'true'
        id: timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M")
          echo "BUILD_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "Generated Timestamp: $TIMESTAMP"
      - name: 📦 Install Base Dependencies
        if: env.SKIP_BUILD != 'true'
        run: |
          echo "::group::📦 Installing Dependencies"
          sudo apt-get update
          # 安装基础构建依赖，不指定特定版本的 clang/gcc，让系统默认值生效
          sudo apt-get install -y \
            git bc bison flex libssl-dev libelf-dev make gcc \
            fakeroot dpkg-dev debhelper wget cpio kmod libncurses-dev \
            rsync zstd unzip curl clang llvm lld
          echo "::endgroup::"
      - name: ⚙️ Optimize Git for Large Repos
        if: env.SKIP_BUILD != 'true'
        run: |
          git config --global http.postBuffer 524288000
          git config --global core.compression 9
          git config --global advice.detachedHead false
      - name: 📂 Clone Linux-TkG Repository
        if: env.SKIP_BUILD != 'true'
        run: >
          echo "::group::📂 Cloning TKG"

          echo "📥 克隆 linux-tkg 仓库..."

          git clone --depth 1 https://github.com/Frogging-Family/linux-tkg.git $TKG_DIR

          echo "::endgroup::"
      - name: 🤖 Auto-Configure BORE & Patches
        if: env.SKIP_BUILD != 'true'
        run: |
          echo "::group::🤖 BORE Configuration"
          if [ -f "./auto_bore_setup.sh" ]; then
            echo "🚀 正在执行 BORE 自动适配..."
            chmod +x ./auto_bore_setup.sh
            ./auto_bore_setup.sh
          else
            echo "⚠️ 未找到 auto_bore_setup.sh，跳过 BORE 适配。"
          fi
          echo "::endgroup::"
      - name: 📝 Prepare Final Configuration
        if: env.SKIP_BUILD != 'true'
        run: >
          echo "::group::📝 Final Config Prep"

          cd $TKG_DIR


          # 复制根目录已修改好的 cfg

          cp ../customization.cfg ./customization.cfg


          # 【关键】从 cfg 中提取实际使用的调度器，用于 Release 显示

          ACTUAL_SCHEDULER=$(grep '^_cpusched=' ./customization.cfg | head -n 1 | sed 's/_cpusched=//; s/"//g; s/^ *//; s/ *$//')

          echo "CPU_SCHEDULER=${ACTUAL_SCHEDULER}" >> $GITHUB_ENV


          echo "--- 📋 最终构建配置 ---"

          grep -E "_version|_cpusched|_compiler|_processor_opt|_lto_mode" ./customization.cfg

          echo "----------------------"

          echo "✅ 检测到调度器: ${ACTUAL_SCHEDULER}"

          echo "::endgroup::"
      - name: 🔨 Compile Kernel
        if: env.SKIP_BUILD != 'true'
        run: |
          echo "::group::🔨 Kernel Compilation (This may take a while)"
          cd $TKG_DIR

          echo "🔨 开始编译内核..."
          echo "   Scheduler: ${CPU_SCHEDULER}"
          echo "   Version: ${NEW_VERSION}"
          echo "   Compiler: Using System Default (Auto-detected by TKG)"

          # 使用 script 模拟终端以解决交互问题
          # TKG 脚本会自动检测并使用系统中可用的最佳编译器
          sudo script -qec './install.sh install' /dev/null
          echo "::endgroup::"
      - name: 🗑️ Cleanup Artifacts & Source
        if: always()
        run: |
          echo "::group::🗑️ Cleanup"
          # 删除巨大的源码目录
          if [ -d "$TKG_DIR/linux-src-git" ]; then
            echo "🗑️ 删除源码目录..."
            sudo rm -rf $TKG_DIR/linux-src-git
          fi

          # 清理不必要的 deb 包
          if [ -d "$TKG_DIR/DEBS" ]; then
            echo "🗑️ 清理调试符号包..."
            sudo rm -f $TKG_DIR/DEBS/*dbg*.deb
            sudo rm -f $TKG_DIR/DEBS/*libc-dev*.deb
            echo "📦 剩余包列表:"
            ls -lh $TKG_DIR/DEBS/
          fi
          echo "::endgroup::"
      - name: 🏷️ Create GitHub Release
        if: env.SKIP_BUILD != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEW_VERSION }}-${{ env.BUILD_TIMESTAMP }}
          name: Linux-TkG ${{ env.NEW_VERSION }} (Built on ${{ env.BUILD_TIMESTAMP }})
          body: |
            Automated build of Linux-TkG kernel for Debian Sid.

            **Configuration:**
            - Scheduler: **${{ env.CPU_SCHEDULER }}**
            - Compiler: System Default (Auto-detected)
            - LTO: Thin
            - Arch Optimization: x86-64-v3

            **Changes:**
            - Updated to kernel version: ${{ env.NEW_VERSION }}
            - Build Timestamp: ${{ env.BUILD_TIMESTAMP }}
          files: |
            ${{ env.TKG_DIR }}/DEBS/*.deb
            ${{ env.TKG_DIR }}/kernelconfig.new
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 💾 Commit Updated Config
        if: env.VERSION_CHANGED == 'true'
        run: >
          echo "::group::💾 Git Commit"

          git config --local user.email "action@github.com"

          git config --local user.name "GitHub Action Bot"

          git add customization.cfg

          git commit -m "chore: update kernel version to ${{ env.NEW_VERSION }}" || echo "No changes to commit"

          git push

          echo "::endgroup::"
      - name: ❌ Notify Failure
        if: failure()
        run: |
          echo "❌ 构建失败！请检查上方日志。"
